name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Lint, Typecheck, Format, and Build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SITE_URL: https://www.hiregeneral.com
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ""
      NEXT_PUBLIC_CLARITY_PROJECT_ID: ""
      NEXT_PUBLIC_SUPABASE_FUNCTION_CONTACT_URL: ""
      NEXT_PUBLIC_SUPABASE_FUNCTION_JOB_APPLICATION_URL: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check --if-present

      - name: Run lint
        run: npm run lint --if-present

      - name: Run typecheck
        run: npm run typecheck --if-present

      - name: Build project
        run: npm run build
